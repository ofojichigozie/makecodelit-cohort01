<!DOCTYPE html>
<html>
  <head>
    <title>Bumia - Register</title>
  </head>
  <body>
    <h3>
      Register
    </h3>
    <form id="regForm">
      <div>
        <label>Full name</label>
        <input type="text" id="regFullname"/>
      </div>
      <div>
        <label>Email</label>
        <input type="email" id="regEmail"/>
      </div>
      <div>
        <label>Phone Number</label>
        <input type="text" id="regPhoneNumber"/>
      </div>
      <div>
        <label>Password</label>
        <input type="password" id="regPassword"/>
      </div>
      <div>
        <label>Business Name</label>
        <input type="text" id="regBusinessName"/>
      </div>
      <div>
        <input type="submit" id="submitButton" value="Register"/>
      </div>
    </form>

    <script src="js/register.js"></script>
  </body>
</html>
