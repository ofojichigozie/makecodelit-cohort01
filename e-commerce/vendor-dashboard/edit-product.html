<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bumia Vendor - Edit Product</title>
  <link rel="stylesheet" href="../css/vendor-dashboard/edit-product.css"/>
</head>

<body>
  <div id="productContainer">
    <h1>Edit Product</h1>
    <form id="editForm">
      <div class="form-group">
        <label for="title">Title</label>
        <input type="text" id="title" name="title"/>
        <p id="titleError"></p>
      </div>
      <div class="form-group">
        <label for="price">Price</label>
        <input type="number" id="price" name="price" step="0.001" min="0"/>
        <p id="priceError"></p>
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <input type="text" id="description" name="description"/>
        <p id="descriptionError"></p>
      </div>
      <div class="form-group">
        <label for="category">Category</label>
        <input type="text" id="category" name="category"/>
        <p id="categoryError"></p>
      </div>
      <div class="form-group">
        <label for="image">Image</label>
        <input type="text" id="image" name="image"/>
        <p id="imageError"></p>
      </div>
      <div>
        <button type="submit" id="saveButton">Save Changes</button>
      </div>
    </form>
  </div>

  <script src="../js/vendor-dashboard/edit-product.js"></script>
</body>

</html>
